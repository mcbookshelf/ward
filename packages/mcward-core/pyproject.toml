[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mcward-core"
version = "1.0.0"
description = "A testing framework for Minecraft datapacks using mcfunction."
readme = "../../README.md"
requires-python = ">=3.14"
license = { text = "MPL-2.0" }
authors = [{ name = "Aksiome", email = "54895777+aksiome@users.noreply.github.com" }]
dependencies = [
    "httpx>=0.27.0",
    "platformdirs>=4.0.0",
    "psutil>=7.2.2",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mcward"]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
